<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>&#128153; &#1208;&#1292; &#1237;&#1273; &#128153;</title>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #4facfe);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Start Screen */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f2027;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#startBtn {
    padding: 20px 50px;
    font-size: 28px;
    background: linear-gradient(45deg, #4facfe, #00f2fe);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    color: white;
    box-shadow: 0 0 20px #4facfe;
    transition: 0.3s;
}

#startBtn:hover {
    transform: scale(1.1);
}

/* Name */
#name {
    position: absolute;
    top: 10%;
    width: 100%;
    font-size: 90px;
    font-weight: bold;
    text-shadow: 0 0 20px #4facfe, 0 0 40px white;
}

/* Message */
#message {
    position: absolute;
    top: 50%;
    width: 100%;
    font-size: 38px;
}

/* Hearts */
.heart {
    position: fixed;
    color: #ff4d6d;
    font-size: 24px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); opacity:0;}
}

/* Balloons */
.balloon {
    position: fixed;
    width: 30px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #6dd5ed, #2193b0);
    animation: balloonFloat 10s linear infinite;
}

.balloon::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 40px;
    background: white;
    top: 40px;
    left: 50%;
}

@keyframes balloonFloat {
    0% { transform: translateY(110vh) translateX(0); }
    50% { transform: translateY(50vh) translateX(30px); }
    100% { transform: translateY(-10vh) translateX(-30px); }
}

/* Flowers */
.flower {
    position: fixed;
    font-size: 22px;
    animation: flowerMove 8s linear infinite;
}

@keyframes flowerMove {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    from {opacity:1;}
    to {opacity:0; transform: scale(2);}
}

/* Letter */
#letter {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: white;
    color: #203a43;
    padding: 30px;
    border-radius: 20px;
    font-size: 22px;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 0 25px #4facfe;
    transition: 0.5s;
}

/* Button */
#openBtn {
    position: absolute;
    bottom: 40px;
    padding: 15px 30px;
    font-size: 20px;
    background: #4facfe;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* Gallery */
#gallery {
    margin-top: 100vh;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
}

#gallery img {
    width: 80%;
    max-width: 500px;
    border-radius: 20px;
    box-shadow: 0 0 25px #4facfe;
    animation: floatImg 5s ease-in-out infinite;
}

@keyframes floatImg {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
}
</style>
</head>

<body>

<div id="startScreen">
    <button id="startBtn">&#128153; Tap to Start &#128153;</button>
</div>

<div id="name"></div>
<div id="message"></div>

<button id="openBtn" onclick="openLetter()">&#128140; Open Message</button>

<div id="letter">
    My love &#128153;<br><br>
    You are my peace, my happiness, my everything.<br>
    Every moment with you feels magical &#10024;<br><br>
    Happy Birthday &#127874;&#128153;<br><br>
    Forever Yours &#128158;
</div>

<div id="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<!-- ✅ GitHub Audio -->
<audio id="music" loop autoplay muted>
    <source src="https://gemechis1999.github.io/love-page/music.mp3" type="audio/mpeg">
</audio>
window.onload = function(){
    let music = document.getElementById("music");

    setTimeout(()=>{
        music.muted = false;
        music.play().catch(()=>{});
    }, 1000);
};
<script>
window.onload = function() {

    document.getElementById("name").innerHTML = "Ayu &#128153;";
    document.getElementById("message").innerHTML = "Happy Birthday My Queen &#128081;&#128153;";

    document.getElementById("startBtn").onclick = function(){
        document.getElementById("startScreen").style.display="none";
        document.getElementById("music").play().catch(()=>{});
    };

    // Hearts
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="&#10084;";
        heart.style.left=Math.random()*100+"%";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),6000);
    },400);

    // Balloons
    setInterval(()=>{
        let b = document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"%";
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),10000);
    },700);

    // Flowers
    setInterval(()=>{
        let f = document.createElement("div");
        f.className="flower";
        f.innerHTML="&#127800;";
        f.style.left=Math.random()*100+"%";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),8000);
    },600);

    // Sparkles
    setInterval(()=>{
        let s = document.createElement("div");
        s.className="sparkle";
        s.style.left=Math.random()*100+"%";
        s.style.top=Math.random()*100+"%";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),3000);
    },200);
};

function openLetter(){
    document.getElementById("letter").style.transform = "translateX(-50%) scale(1)";
}
</script>

</body>
</html>
