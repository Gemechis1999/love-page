<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>❤️ ለኔ ሴት ❤️</title>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    background: black;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* Smooth scroll */
html {
    scroll-behavior: smooth;
}

/* Start Screen */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#startBtn {
    padding: 20px 40px;
    font-size: 24px;
    background: pink;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* Name */
#name {
    position: absolute;
    top: 10%;
    width: 100%;
    font-size: 50px;
}

.letter {
    opacity: 0;
    display: inline-block;
    transform: translateY(-50px);
    animation: drop 0.5s forwards;
}

@keyframes drop {
    to { opacity: 1; transform: translateY(0); }
}

/* Message */
#message {
    position: absolute;
    top: 55%;
    width: 100%;
    font-size: 24px;
}

/* Hearts */
.heart {
    position: fixed;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Letter */
#letter {
    position: absolute;
    top: 75%;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

/* Button */
#openBtn {
    position: absolute;
    bottom: 50px;
}

/* Gallery (NEW) */
#gallery {
    margin-top: 100vh;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
}

#gallery img {
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="startScreen">
    <button id="startBtn">💖 Tap to Start 💖</button>
</div>

<div id="name"></div>
<div id="message"></div>

<button id="openBtn" onclick="openLetter()">💌 Open Message</button>

<div id="letter">
    My love ❤️<br><br>
    You are my happiness, my peace, my everything.<br>
    I’m so lucky to have you in my life.<br><br>
    Happy Birthday 🎂💖
</div>

<!-- NEW SCROLL GALLERY -->
<div id="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<audio id="music" loop>
    <source src="https://drive.google.com/uc?export=download&id=1BlP9FQ0EFXWieRSmUMMiKc0SvdBOEznT">
</audio>

<script>
window.onload = function() {

    // Name animation
    const name = "Ayu";
    const container = document.getElementById("name");

    name.split("").forEach((c,i)=>{
        let span = document.createElement("span");
        span.textContent = c;
        span.className = "letter";
        span.style.animationDelay = i * 0.3 + "s";
        container.appendChild(span);
    });

    // Typing message
    const text = "Happy Birthday Mi Reina 💖";
    let i = 0;

    function type() {
        if(i < text.length){
            document.getElementById("message").innerHTML += text[i];
            i++;
            setTimeout(type, 80);
        }
    }
    setTimeout(type,1500);

    // Start button
    document.getElementById("startBtn").onclick = function(){
        document.getElementById("startScreen").style.display="none";
        document.getElementById("music").play();
    };

    // Floating hearts
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"%";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),5000);
    },500);
};

// Open letter
function openLetter(){
    document.getElementById("letter").style.display="block";
}
</script>

</body>
</html>
