<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💙 ለኔ ሴት 💙</title>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #4facfe);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Start Screen */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0f2027;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

#startBtn {
    padding: 20px 50px;
    font-size: 28px;
    background: linear-gradient(45deg, #4facfe, #00f2fe);
    border: none;
    border-radius: 15px;
    cursor: pointer;
    color: white;
    box-shadow: 0 0 20px #4facfe;
    transition: 0.3s;
}

#startBtn:hover {
    transform: scale(1.1);
}

/* Name */
#name {
    position: absolute;
    top: 10%;
    width: 100%;
    font-size: 90px;
    font-weight: bold;
    text-shadow: 0 0 20px #4facfe, 0 0 40px white;
}

.letter {
    opacity: 0;
    display: inline-block;
    transform: translateY(-120px);
    animation: drop 0.8s forwards;
}

@keyframes drop {
    to { opacity: 1; transform: translateY(0); }
}

/* Message */
#message {
    position: absolute;
    top: 50%;
    width: 100%;
    font-size: 38px;
    text-shadow: 0 0 10px white;
}

/* Hearts */
.heart {
    position: fixed;
    color: #ff4d6d;
    font-size: 24px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity:1;}
    to { transform: translateY(-10vh); opacity:0;}
}

/* Balloons */
.balloon {
    position: fixed;
    width: 30px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #6dd5ed, #2193b0);
    animation: balloonFloat 10s linear infinite;
}

.balloon::after {
    content: '';
    position: absolute;
    width: 2px;
    height: 40px;
    background: white;
    top: 40px;
    left: 50%;
}

@keyframes balloonFloat {
    from { transform: translateY(110vh);}
    to { transform: translateY(-10vh);}
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    from {opacity:1;}
    to {opacity:0; transform: scale(2);}
}

/* Letter */
#letter {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: white;
    color: #203a43;
    padding: 30px;
    border-radius: 20px;
    font-size: 22px;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 0 25px #4facfe;
    transition: 0.5s;
}

/* Button */
#openBtn {
    position: absolute;
    bottom: 40px;
    padding: 15px 30px;
    font-size: 20px;
    background: #4facfe;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px #4facfe;
}

/* Gallery */
#gallery {
    margin-top: 100vh;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    align-items: center;
}

#gallery img {
    width: 80%;
    max-width: 500px;
    border-radius: 20px;
    box-shadow: 0 0 25px #4facfe;
    transition: 0.5s;
}

#gallery img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div id="startScreen">
    <button id="startBtn">💙 Tap to Start 💙</button>
</div>

<div id="name"></div>
<div id="message"></div>

<button id="openBtn" onclick="openLetter()">💌 Open Message</button>

<div id="letter">
    My love 💙<br><br>
    You are my peace, my happiness, my everything.<br>
    Every moment with you feels magical ✨<br><br>
    Happy Birthday 🎂💙<br><br>
    Forever Yours 💞
</div>

<div id="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<audio id="music" loop>
    <source src="https://drive.google.com/uc?export=download&id=1BlP9FQ0EFXWieRSmUMMiKc0SvdBOEznT">
</audio>

<script>
window.onload = function() {

    const name = "Ayu 💙";
    const container = document.getElementById("name");

    name.split("").forEach((c,i)=>{
        let span = document.createElement("span");
        span.textContent = c;
        span.className = "letter";
        span.style.animationDelay = i * 0.2 + "s";
        container.appendChild(span);
    });

    const text = "Happy Birthday My Queen 👑💙";
    let i = 0;

    function type() {
        if(i < text.length){
            document.getElementById("message").innerHTML += text[i];
            i++;
            setTimeout(type, 70);
        }
    }
    setTimeout(type,1500);

    document.getElementById("startBtn").onclick = function(){
        document.getElementById("startScreen").style.display="none";
        document.getElementById("music").play();
    };

    // Hearts
    setInterval(()=>{
        let heart = document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"%";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),6000);
    },400);

    // Balloons
    setInterval(()=>{
        let b = document.createElement("div");
        b.className="balloon";
        b.style.left=Math.random()*100+"%";
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),10000);
    },800);

    // Sparkles
    setInterval(()=>{
        let s = document.createElement("div");
        s.className="sparkle";
        s.style.left=Math.random()*100+"%";
        s.style.top=Math.random()*100+"%";
        document.body.appendChild(s);
        setTimeout(()=>s.remove(),3000);
    },200);
};

function openLetter(){
    document.getElementById("letter").style.transform = "translateX(-50%) scale(1)";
}
</script>

</body>
</html>
